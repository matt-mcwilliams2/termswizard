<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Affiliate Terms Wizard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="icon" type="image/png" href="https://www.mattmcwilliams.com/wp-content/uploads/2026/04/affiliate_terms_wizard_favicon.png">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <img src="https://www.mattmcwilliams.com/wp-content/uploads/2026/03/affiliate-terms-wizard-logo-1.png" alt="Affiliate Terms Wizard" class="login-logo">
            <h1>Reset Password</h1>
            <p>Enter your new password below</p>

            <div class="error-message" id="errorMsg"></div>
            <div class="success-message" id="successMsg"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input type="password" id="newPassword" class="form-input" placeholder="New password" required minlength="8">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="Confirm password" required minlength="8">
                </div>
                <button type="submit" class="btn btn-gold" style="width:100%">Set New Password</button>
            </form>

            <a href="/login" class="forgot-link">Back to login</a>
        </div>
    </div>

    <footer class="site-footer">
        <p>This is not legal advice. Affiliate Terms Wizard is a tool for drafting and reviewing affiliate program agreements. For legal guidance specific to your business, please consult a licensed attorney.</p>
    </footer>

    <script>
        const form = document.getElementById('resetForm');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            errorMsg.textContent = 'Invalid reset link. Please request a new one.';
            errorMsg.style.display = 'block';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (newPass !== confirmPass) {
                errorMsg.textContent = 'Passwords do not match.';
                errorMsg.style.display = 'block';
                return;
            }

            const res = await fetch('/api/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, new_password: newPass }),
            });

            if (res.ok) {
                successMsg.textContent = 'Password reset successfully! Redirecting to login...';
                successMsg.style.display = 'block';
                form.style.display = 'none';
                setTimeout(() => window.location.href = '/login', 2000);
            } else {
                const data = await res.json();
                errorMsg.textContent = data.detail || 'Reset failed. The link may have expired.';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>
</html>
